domain: server
description: HTTP server, handlers, templates, and view model builders
features:
  - id: server.http-handlers
    name: HTTP Handlers
    description: Full-page and htmx partial route handlers, API endpoints (scan, feature detail, diff snapshot/compare)
    priority: high
    surfaces:
      api:
        - method: GET
          path: /
        - method: GET
          path: /features
        - method: GET
          path: /graph
        - method: GET
          path: /sprint
        - method: GET
          path: /contract
        - method: GET
          path: /metrics
        - method: GET
          path: /diff
        - method: GET
          path: /diagnose
        - method: GET
          path: /pages/*
        - method: POST
          path: /api/scan
        - method: GET
          path: /api/feature/:id
        - method: POST
          path: /api/diff/snapshot
        - method: GET
          path: /api/diff/compare
    coverage:
      unit:
        backend:
          status: covered
          tests:
            - file: internal/server/server_test.go
              functions:
                - name: TestFullPageRoutes_Return200WithShell
                  run: go test ./internal/server/...
                - name: TestFullPageRoot_404OnUnknownPath
                  run: go test ./internal/server/...
                - name: TestPartialRoutes_ReturnContentWithoutShell
                  run: go test ./internal/server/...
                - name: TestFeaturesPage_ShowsAllFeatures
                  run: go test ./internal/server/...
                - name: TestFeaturesPartial_FilterByQuery
                  run: go test ./internal/server/...
                - name: TestFeaturesPartial_FilterByPriority
                  run: go test ./internal/server/...
                - name: TestFeaturesPartial_HXTargetTableBody_ReturnsRowsOnly
                  run: go test ./internal/server/...
                - name: TestGraphPage_DefaultsToFirstFeature
                  run: go test ./internal/server/...
                - name: TestGraphPage_SpecificFeature
                  run: go test ./internal/server/...
                - name: TestContractPartial_KnownFeature
                  run: go test ./internal/server/...
                - name: TestDiagnosePartial_GET
                  run: go test ./internal/server/...
                - name: TestDiagnosePartial_POST_WithSymptom
                  run: go test ./internal/server/...
                - name: TestDiagnosePartial_POST_EmptySymptom
                  run: go test ./internal/server/...
                - name: TestFeatureDetail_ValidFeature
                  run: go test ./internal/server/...
                - name: TestFeatureDetail_UnknownFeature
                  run: go test ./internal/server/...
                - name: TestFeatureDetail_MissingID
                  run: go test ./internal/server/...
                - name: TestScanModal_ReturnsModalHTML
                  run: go test ./internal/server/...
                - name: TestScan_MethodNotAllowed
                  run: go test ./internal/server/...
                - name: TestScan_POST_ReturnsStatusBar
                  run: go test ./internal/server/...
                - name: TestDiffSnapshot_POST_SavesAndReturnsContent
                  run: go test ./internal/server/...
                - name: TestDiffCompare_AfterSnapshot
                  run: go test ./internal/server/...
                - name: TestDiffCompare_MissingSnapshot_Returns500
                  run: go test ./internal/server/...
                - name: TestSprintPartial_ShowsPrioritizedItems
                  run: go test ./internal/server/...
                - name: TestMetricsPage_ShowsCoverageBars
                  run: go test ./internal/server/...
                - name: TestOverviewPage_StatusBarHasFeatureCount
                  run: go test ./internal/server/...

  - id: server.view-model-builders
    name: View Model Builders
    description: Pure functions transforming domain types into template view models (featureHealth, buildPriorityRings, buildCoverageBars, buildGraphVM, computeDiff, etc.)
    priority: high
