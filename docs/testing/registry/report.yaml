domain: report
description: Coverage reporting and status display
features:
  - id: report.generate
    name: Report Generator
    description: Generate comprehensive coverage reports in markdown, JSON, and terminal
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/app/generate_report_test.go
              functions:
                - name: TestGenerateReportExecute
                  run: go test -run TestGenerateReportExecute ./internal/app/...
                - name: TestGenerateReportEmptyRegistry
                  run: go test -run TestGenerateReportEmptyRegistry ./internal/app/...
          files:
            - internal/app/generate_report_test.go
      integration: {}
      e2e: {}
  - id: report.status
    name: Status Dashboard
    description: Coverage dashboard filtered by domain and priority
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/app/get_status_test.go
              functions:
                - name: TestGetStatusExecuteNoFilter
                  run: go test -run TestGetStatusExecuteNoFilter ./internal/app/...
                - name: TestGetStatusFilterByDomain
                  run: go test -run TestGetStatusFilterByDomain ./internal/app/...
                - name: TestGetStatusFilterByPriority
                  run: go test -run TestGetStatusFilterByPriority ./internal/app/...
                - name: TestGetStatusNonExistentDomain
                  run: go test -run TestGetStatusNonExistentDomain ./internal/app/...
          files:
            - internal/app/get_status_test.go
      integration: {}
      e2e: {}
  - id: report.check
    name: Feature Check
    description: Detailed coverage check for a single feature
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/app/check_feature_test.go
              functions:
                - name: TestCheckFeatureExecute
                  run: go test -run TestCheckFeatureExecute ./internal/app/...
                - name: TestCheckFeatureEntries
                  run: go test -run TestCheckFeatureEntries ./internal/app/...
          files:
            - internal/app/check_feature_test.go
      integration: {}
      e2e: {}
  - id: report.terminal-renderer
    name: Terminal Renderer
    description: Render coverage tables with color and alignment to terminal
    roles: []
    priority: medium
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/adapters/terminal_reporter_test.go
              functions:
                - name: TestTerminalReporterRender
                  run: go test -run TestTerminalReporterRender ./internal/adapters/...
                - name: TestTerminalReporterRenderShowsCriticalGaps
                  run: go test -run TestTerminalReporterRenderShowsCriticalGaps ./internal/adapters/...
                - name: TestTerminalReporterRenderEmptyDomains
                  run: go test -run TestTerminalReporterRenderEmptyDomains ./internal/adapters/...
                - name: TestTerminalReporterRenderFeatureDetail
                  run: go test -run TestTerminalReporterRenderFeatureDetail ./internal/adapters/...
                - name: TestTerminalReporterRenderFeatureDetailFullyCovered
                  run: go test -run TestTerminalReporterRenderFeatureDetailFullyCovered ./internal/adapters/...
                - name: TestTerminalReporterStatusIconNoColor
                  run: go test -run TestTerminalReporterStatusIconNoColor ./internal/adapters/...
                - name: TestTerminalReporterFormatPercent
                  run: go test -run TestTerminalReporterFormatPercent ./internal/adapters/...
      integration: {}
      e2e: {}
  - id: report.markdown-renderer
    name: Markdown Renderer
    description: Render coverage reports as markdown files
    roles: []
    priority: low
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/adapters/markdown_reporter_test.go
              functions:
                - name: TestMarkdownReporterRender
                  run: go test -run TestMarkdownReporterRender ./internal/adapters/...
                - name: TestMarkdownReporterRenderEmptyDomains
                  run: go test -run TestMarkdownReporterRenderEmptyDomains ./internal/adapters/...
                - name: TestStatusEmoji
                  run: go test -run TestStatusEmoji ./internal/adapters/...
                - name: TestCapitalizeFirst
                  run: go test -run TestCapitalizeFirst ./internal/adapters/...
                - name: TestPercent
                  run: go test -run TestPercent ./internal/adapters/...
                - name: TestRatio
                  run: go test -run TestRatio ./internal/adapters/...
      integration: {}
      e2e: {}
