    roles: []
    priority: medium
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/app/diagnose_feature_test.go
              functions:
                - name: TestDiagnoseExecute_401Symptom
                  run: go test -run TestDiagnoseExecute_401Symptom ./internal/app/...
                - name: TestDiagnoseExecute_500Symptom
                  run: go test -run TestDiagnoseExecute_500Symptom ./internal/app/...
                - name: TestDiagnoseExecute_TimeoutSymptom
                  run: go test -run TestDiagnoseExecute_TimeoutSymptom ./internal/app/...
                - name: TestDiagnoseExecute_NoMatchingSymptom
                  run: go test -run TestDiagnoseExecute_NoMatchingSymptom ./internal/app/...
                - name: TestDiagnoseExecute_NoAPISurfaces
                  run: go test -run TestDiagnoseExecute_NoAPISurfaces ./internal/app/...
                - name: TestDiagnoseExecute_NonExistentFeature
                  run: go test -run TestDiagnoseExecute_NonExistentFeature ./internal/app/...
                - name: TestDiagnoseExecute_CheckFilesRemainder
                  run: go test -run TestDiagnoseExecute_CheckFilesRemainder ./internal/app/...
