                - name: TestGoTestResultParserEmptyFile
                  run: go test -run TestGoTestResultParserEmptyFile ./internal/adapters/...
                - name: TestSplitCamelToLower
                  run: go test -run TestSplitCamelToLower ./internal/adapters/...
                - name: TestPackageToFilePath
                  run: go test -run TestPackageToFilePath ./internal/adapters/...
            - file: internal/adapters/playwright_results_test.go
              functions:
