domain: workflow
description: Sprint planning, gap extraction, and diff tracking
features:
  - id: workflow.sprint
    name: Sprint Planning
    description: Priority-weighted gap ranking for sprint planning
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: cmd/sprint_test.go
              functions:
                - name: TestNormalizeTestType
                  run: go test -run TestNormalizeTestType ./cmd/...
                - name: TestNormalizePerfGapType
                  run: go test -run TestNormalizePerfGapType ./cmd/...
                - name: TestExtractDomain
                  run: go test -run TestExtractDomain ./cmd/...
      integration: {}
      e2e: {}
  - id: workflow.gaps
    name: Gap Extraction
    description: Actionable gap export in terminal, JSON, actionable, and prompt formats
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: cmd/gaps_test.go
              functions:
                - name: TestSeverityColor
                  run: go test -run TestSeverityColor ./cmd/...
                - name: TestTestPattern
                  run: go test -run TestTestPattern ./cmd/...
                - name: TestPromptActionDescription_WithFile
                  run: go test -run TestPromptActionDescription_WithFile ./cmd/...
                - name: TestPromptActionDescription_WithoutFile
                  run: go test -run TestPromptActionDescription_WithoutFile ./cmd/...
      integration: {}
      e2e: {}
  - id: workflow.diff
    name: Health Diff
    description: Compare health snapshots across sprints with save/load support
    roles: []
    priority: medium
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: cmd/diff_test.go
              functions:
                - name: TestComputeDiff_ImprovedAndUnchanged
                  run: go test -run TestComputeDiff_ImprovedAndUnchanged ./cmd/...
                - name: TestComputeDiff_RemovedFeature
                  run: go test -run TestComputeDiff_RemovedFeature ./cmd/...
                - name: TestComputeDiff_NewFeature
                  run: go test -run TestComputeDiff_NewFeature ./cmd/...
                - name: TestComputeDiff_Regressed
                  run: go test -run TestComputeDiff_Regressed ./cmd/...
                - name: TestComputeDiff_MixedScenario
                  run: go test -run TestComputeDiff_MixedScenario ./cmd/...
                - name: TestRoundTo4
                  run: go test -run TestRoundTo4 ./cmd/...
                - name: TestFormatDeltaPct
                  run: go test -run TestFormatDeltaPct ./cmd/...
                - name: TestFormatScorePct
                  run: go test -run TestFormatScorePct ./cmd/...
      integration: {}
      e2e: {}
  - id: workflow.run
    name: Run Commands
    description: Generate and execute test run commands per feature and platform
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/domain/run_command_test.go
              functions:
                - name: TestGenerateRunCommand
                  run: go test -run TestGenerateRunCommand ./internal/domain/...
                - name: TestGoPackagePath
                  run: go test -run TestGoPackagePath ./internal/domain/...
                - name: TestEscapeRegex
                  run: go test -run TestEscapeRegex ./internal/domain/...
                - name: TestCollectRunCommands
                  run: go test -run TestCollectRunCommands ./internal/domain/...
                - name: TestHasFlag
                  run: go test -run TestHasFlag ./internal/domain/...
          files:
            - internal/domain/run_command_test.go
      integration: {}
      e2e: {}
  - id: workflow.update
    name: Update Coverage
    description: Ingest test results from Playwright, Go test, and Maestro
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/adapters/go_test_results_test.go
