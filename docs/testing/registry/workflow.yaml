                  run: go test -run TestPlaywrightResultParserParse ./internal/adapters/...
                - name: TestPlaywrightResultParserParseDirectory
                  run: go test -run TestPlaywrightResultParserParseDirectory ./internal/adapters/...
                - name: TestPlaywrightResultParserNoJsonFile
                  run: go test -run TestPlaywrightResultParserNoJsonFile ./internal/adapters/...
                - name: TestInferFeatureFromPath
                  run: go test -run TestInferFeatureFromPath ./internal/adapters/...
            - file: internal/app/update_coverage_test.go
              functions:
