    surfaces: {}
    coverage:
      unit:
        backend:
          status: missing
          mocked: false
      integration: {}
      e2e: {}
  - id: audit.summary
    name: Audit Summary
    description: Aggregate counts per priority tier with progress bars
    roles: []
    priority: medium
    surfaces: {}
    coverage:
      unit:
        backend:
          status: missing
          mocked: false
      integration: {}
