                - name: TestParsePlaywrightMetrics_FlakyWithRetries
                  run: go test -run TestParsePlaywrightMetrics_FlakyWithRetries ./internal/adapters/...
                - name: TestParsePlaywrightMetrics_NestedSuites
                  run: go test -run TestParsePlaywrightMetrics_NestedSuites ./internal/adapters/...
                - name: TestParsePlaywrightMetrics_EmptySuites
                  run: go test -run TestParsePlaywrightMetrics_EmptySuites ./internal/adapters/...
                - name: TestParsePlaywrightMetrics_InvalidJSON
                  run: go test -run TestParsePlaywrightMetrics_InvalidJSON ./internal/adapters/...
          files:
            - internal/adapters/metrics_playwright_parser_test.go
      integration: {}
      e2e: {}
  - id: metrics.vitest-parser
    name: Vitest Metrics Parser
    description: Parse Vitest output for test metrics
    roles: []
    priority: medium
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/adapters/metrics_vitest_parser_test.go
