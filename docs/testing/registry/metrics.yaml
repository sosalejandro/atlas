                - name: TestParseVitestMetrics_SkippedTests
                  run: go test -run TestParseVitestMetrics_SkippedTests ./internal/adapters/...
                - name: TestParseVitestMetrics_EmptyResults
                  run: go test -run TestParseVitestMetrics_EmptyResults ./internal/adapters/...
                - name: TestParseVitestMetrics_InvalidJSON
                  run: go test -run TestParseVitestMetrics_InvalidJSON ./internal/adapters/...
          files:
            - internal/adapters/metrics_vitest_parser_test.go
      integration: {}
      e2e: {}
  - id: metrics.store
    name: Metrics Store
    description: Load and save test metrics history
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
