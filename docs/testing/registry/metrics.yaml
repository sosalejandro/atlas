domain: metrics
description: Test metrics parsing, storage, and quality signals
features:
  - id: metrics.go-parser
    name: Go Metrics Parser
    description: Parse Go benchmark and test output for metrics
    roles: []
    priority: high
    surfaces: {}
    coverage:
      unit:
        backend:
          status: covered
          mocked: false
          tests:
            - file: internal/adapters/metrics_go_parser_test.go
              functions:
                - name: TestParseGoTestMetrics_BasicPassFail
                  run: go test -run TestParseGoTestMetrics_BasicPassFail ./internal/adapters/...
                - name: TestParseGoTestMetrics_SkippedTests
                  run: go test -run TestParseGoTestMetrics_SkippedTests ./internal/adapters/...
                - name: TestParseGoTestMetrics_BenchmarkStats
                  run: go test -run TestParseGoTestMetrics_BenchmarkStats ./internal/adapters/...
                - name: TestParseGoTestMetrics_RaceDetection
                  run: go test -run TestParseGoTestMetrics_RaceDetection ./internal/adapters/...
                - name: TestParseGoTestMetrics_WallTime
                  run: go test -run TestParseGoTestMetrics_WallTime ./internal/adapters/...
                - name: TestParseGoTestMetrics_EmptyInput
                  run: go test -run TestParseGoTestMetrics_EmptyInput ./internal/adapters/...
                - name: TestParseGoTestMetrics_NonJSONLines
                  run: go test -run TestParseGoTestMetrics_NonJSONLines ./internal/adapters/...
          files:
            - internal/adapters/metrics_go_parser_test.go
      integration: {}
      e2e: {}
  - id: metrics.playwright-parser
    name: Playwright Metrics Parser
    description: Parse Playwright test result JSON for metrics
    roles: []
    priority: medium
    surfaces: {}
    coverage:
