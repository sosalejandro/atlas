name: CI

on:
  push:
    branches: [main, 'phase-*/*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install sqlc
        # Pin to the version used to generate packages/store/sqlc/ —
        # bumping requires running `sqlc generate` and reviewing the diff.
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: sqlc diff (generated code is up to date)
        # Fails when packages/store/queries/*.sql has been edited but the
        # generated code in packages/store/sqlc/ wasn't regenerated. Run
        # `cd packages/store && sqlc generate` locally and commit the
        # output to fix.
        working-directory: packages/store
        run: sqlc diff

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -race -timeout 5m

      - name: go test (integration tag)
        # Runs the framework-parser integration tests added in W2-E.
        # Scoped to packages/coverage/... so TestIngest_NutritionDogfood
        # (which requires the nutrition-v2-go checkout) is excluded.
        run: go test -tags=integration ./packages/coverage/... -race -timeout 5m

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint v2.12.x is built with Go 1.26 and supports go.mod
          # targeting >= 1.25 (our current target). Earlier v2.0.x was built
          # against Go 1.24 and refused to load configs whose go.mod target
          # was 1.25+. Bumping the patch line forward keeps us ahead of the
          # Go toolchain we build the binary with.
          version: v2.12.2
          args: --timeout=5m
