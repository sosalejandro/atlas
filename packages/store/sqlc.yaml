version: "2"
sql:
  - engine: "sqlite"
    schema: "schema/"
    queries: "queries/"
    gen:
      go:
        package: "sqlc"
        out: "sqlc/"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
