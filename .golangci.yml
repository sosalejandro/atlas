# golangci-lint configuration for Atlas
# https://golangci-lint.run/usage/configuration/
# v2 schema (golangci-lint v2.x — verified against v2.12.x)

version: "2"

run:
  timeout: 5m
  tests: true

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
      colors: true

linters:
  # v2 schema replaces `disable-all: true` with `default: none`.
  default: none
  enable:
    - govet         # Go vet checks (default)
    - errcheck      # Unchecked errors (default)
    - staticcheck   # Static analysis (default)
    - ineffassign   # Ineffectual assignments (default)
    - unused        # Unused code (default)
    - gocyclo       # Cyclomatic complexity
    - funlen        # Function length
    - errorlint     # Idiomatic error wrapping (errors.Is / %w)
    - wrapcheck     # External errors must be wrapped
    - interfacebloat # Interface size cap (avoid god-interfaces)

  # v2 schema: linter-specific settings live under `linters.settings`
  # (was top-level `linters-settings` in the transitional v2.0.x schema).
  settings:
    errcheck:
      # CLI tool: writes to stdout / stderr / bytes.Buffer are intentionally
      # unchecked across cmd/* — a failed write to os.Stdout is unrecoverable
      # from inside the command anyway. This matches the Go stdlib convention
      # (cmd/go itself ignores these writes). Real I/O sinks (files, network)
      # are NOT in this list and remain checked.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (*bytes.Buffer).WriteString
        - (*strings.Builder).WriteString

    gocyclo:
      min-complexity: 15

    funlen:
      lines: 80
      statements: 50

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    wrapcheck:
      # Project boundary: anything inside github.com/sosalejandro/atlas does NOT
      # need wrapping (it's our own code). External errors must be wrapped with
      # %w so callers can errors.Is / errors.As across the boundary.
      ignore-package-globs:
        - github.com/sosalejandro/atlas/*

    interfacebloat:
      # 10 is the lib default; explicit so a future reviewer sees the intent.
      max: 10

  # v2 schema consolidates `issues.exclude-dirs`, `issues.exclude-files`,
  # and `issues.exclude-rules` under `linters.exclusions`.
  exclusions:
    # Exclude generated code + legacy testreg layout. The internal/ tree is the
    # pre-restructure code carried over from the testreg fork (see Phase 0 plan
    # in docs/migration-from-testreg.md). It will be migrated into packages/
    # phase by phase and deleted in Phase 7 cleanup. Until then it is treated
    # as legacy: no linting, no churn.
    paths:
      - internal
      - e2e
      - packages/codeindex/ts        # contains embedded TS scanner; not Go
      - ".*_gen\\.go$"
      - "wire_gen\\.go$"
      - ".*\\.pb\\.go$"

    rules:
      # Tests can be longer + don't need to wrap test-fixture errors.
      - path: _test\.go
        linters:
          - funlen
          - wrapcheck
          - errcheck
          - gocyclo

      # cmd/atlas main wires cobra; long but linear.
      - path: cmd/atlas/main\.go
        linters:
          - funlen
          - gocyclo

      # Pre-existing complexity (gocyclo + funlen) carried over from the
      # testreg fork. Surfaced by golangci-lint v2.12.x + Go 1.26 toolchain
      # bump; the older v2.0.x baseline never reached this code path because
      # the lint step was broken on Go 1.25 modules (see CI bump PR
      # introducing this file). Refactor backlog — split each into smaller
      # helpers when touching these. Listed per-function via file path to
      # keep the gate strict for new code.
      - path: cmd/audit\.go
        text: "(func `runAllAudit`|'runAllAudit')"
        linters: [gocyclo, funlen]
      - path: cmd/diff\.go
        text: "(func `renderDiffTerminal`|'renderDiffTerminal')"
        linters: [gocyclo, funlen]
      - path: cmd/init_cmd\.go
        text: "(func `runDiscoverInit`|'runDiscoverInit')"
        linters: [gocyclo, funlen]
      - path: packages/codeindex/annotations/comments\.go
        text: "func `findCommentOpen`"
        linters: [gocyclo]
      - path: packages/codeindex/codeindex\.go
        text: "func `IndexProject`"
        linters: [gocyclo]
      - path: packages/codeindex/go/scanner\.go
        text: "func `\\(\\*scanContext\\)\\.(resolveHandlerRefs|resolveSelectorCall|fuzzyResolveMethod)`"
        linters: [gocyclo]
      - path: packages/graph/graph\.go
        text: "func `\\(\\*Graph\\)\\.FindPathTo`"
        linters: [gocyclo]
      - path: packages/store/ingest\.go
        text: "(func `\\(\\*Store\\)\\.Ingest`|'Ingest')"
        linters: [gocyclo, funlen]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
